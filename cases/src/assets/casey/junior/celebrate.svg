<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Junior Casey — celebrate">
  <title>Junior Casey, celebrate</title>
  <!-- body: slight hop (shifted up) -->
  <path d="M24,65 C20,69 20,87 30,92 L70,92 C80,87 80,69 76,65 C68,57 57,55 50,55 C43,55 32,57 24,65 Z" fill="#7DA888"/>
  <rect x="40" y="76" width="20" height="11" rx="2" fill="#6B9070" opacity="0.4"/>
  <!-- left arm: raised high -->
  <path d="M27,68 C22,59 20,48 25,40" stroke="#7DA888" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="26" cy="38" rx="6" ry="7" fill="#F2EDE6"/>
  <circle cx="22" cy="36" r="2.5" fill="#E8E0D4"/>
  <circle cx="26" cy="33" r="2.5" fill="#E8E0D4"/>
  <circle cx="30" cy="36" r="2.5" fill="#E8E0D4"/>
  <!-- right arm: raised high -->
  <path d="M73,68 C78,59 80,48 75,40" stroke="#7DA888" stroke-width="9" fill="none" stroke-linecap="round"/>
  <ellipse cx="74" cy="38" rx="6" ry="7" fill="#F2EDE6"/>
  <circle cx="70" cy="36" r="2.5" fill="#E8E0D4"/>
  <circle cx="74" cy="33" r="2.5" fill="#E8E0D4"/>
  <circle cx="78" cy="36" r="2.5" fill="#E8E0D4"/>
  <!-- collar -->
  <rect x="34" y="59" width="32" height="5" rx="2.5" fill="#5E8F72"/>
  <rect x="47" y="62" width="6" height="7" rx="1.5" fill="#7CB89A"/>
  <text x="50" y="67.5" text-anchor="middle" font-family="monospace" font-size="3" fill="#3A6B4F">&lt;&gt;</text>
  <!-- head -->
  <ellipse cx="50" cy="35" rx="23" ry="25" fill="#F2EDE6"/>
  <ellipse cx="50" cy="40" rx="15" ry="11" fill="#E8E0D4" opacity="0.35"/>
  <!-- ears: perked for excitement -->
  <path d="M28,21 L20,3 L40,15 Z" fill="#F2EDE6"/>
  <path d="M30,20 L24,8 L38,16 Z" fill="#EAB5B5" opacity="0.75"/>
  <path d="M72,21 L80,3 L60,15 Z" fill="#F2EDE6"/>
  <path d="M70,20 L76,8 L62,16 Z" fill="#EAB5B5" opacity="0.75"/>
  <!-- eyes: happy squint -->
  <path d="M31,33 Q38,39 45,33" stroke="#1A1410" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M55,33 Q62,39 69,33" stroke="#1A1410" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose + big smile -->
  <path d="M47,44 L50,48 L53,44 Q50,42 47,44 Z" fill="#D4909A"/>
  <path d="M43,50 Q50,58 57,50" stroke="#B07878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="27" y1="45" x2="42" y2="46" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="27" y1="48" x2="42" y2="49" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="46" x2="73" y2="45" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="49" x2="73" y2="48" stroke="#C8BFB5" stroke-width="0.8"/>
</svg>
