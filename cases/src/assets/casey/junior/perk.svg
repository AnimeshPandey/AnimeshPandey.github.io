<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Junior Casey — perk">
  <title>Junior Casey, perk</title>
  <!-- body -->
  <path d="M24,68 C20,72 20,90 30,95 L70,95 C80,90 80,72 76,68 C68,60 57,58 50,58 C43,58 32,60 24,68 Z" fill="#7DA888"/>
  <rect x="40" y="79" width="20" height="11" rx="2" fill="#6B9070" opacity="0.4"/>
  <!-- paws: alert, slightly forward -->
  <ellipse cx="33" cy="91" rx="9" ry="5" fill="#F2EDE6"/>
  <circle cx="28" cy="90" r="2.5" fill="#E8E0D4"/>
  <circle cx="33" cy="88" r="2.5" fill="#E8E0D4"/>
  <circle cx="38" cy="90" r="2.5" fill="#E8E0D4"/>
  <ellipse cx="67" cy="91" rx="9" ry="5" fill="#F2EDE6"/>
  <circle cx="62" cy="90" r="2.5" fill="#E8E0D4"/>
  <circle cx="67" cy="88" r="2.5" fill="#E8E0D4"/>
  <circle cx="72" cy="90" r="2.5" fill="#E8E0D4"/>
  <!-- collar -->
  <rect x="34" y="62" width="32" height="5" rx="2.5" fill="#5E8F72"/>
  <rect x="47" y="65" width="6" height="7" rx="1.5" fill="#7CB89A"/>
  <text x="50" y="70.5" text-anchor="middle" font-family="monospace" font-size="3" fill="#3A6B4F">&lt;&gt;</text>
  <!-- head -->
  <ellipse cx="50" cy="38" rx="23" ry="25" fill="#F2EDE6"/>
  <ellipse cx="50" cy="43" rx="15" ry="11" fill="#E8E0D4" opacity="0.35"/>
  <!-- ears: perked high -->
  <path d="M28,22 L20,2 L40,15 Z" fill="#F2EDE6"/>
  <path d="M30,21 L24,7 L38,16 Z" fill="#EAB5B5" opacity="0.75"/>
  <path d="M72,22 L80,2 L60,15 Z" fill="#F2EDE6"/>
  <path d="M70,21 L76,7 L62,16 Z" fill="#EAB5B5" opacity="0.75"/>
  <!-- eyes: wide/alert -->
  <ellipse cx="38" cy="35" rx="8" ry="9" fill="#5BA3D4"/>
  <ellipse cx="38" cy="36" rx="5.5" ry="6.5" fill="#1A1410"/>
  <circle cx="40" cy="31" r="2.5" fill="#fff"/>
  <ellipse cx="62" cy="35" rx="8" ry="9" fill="#5BA3D4"/>
  <ellipse cx="62" cy="36" rx="5.5" ry="6.5" fill="#1A1410"/>
  <circle cx="64" cy="31" r="2.5" fill="#fff"/>
