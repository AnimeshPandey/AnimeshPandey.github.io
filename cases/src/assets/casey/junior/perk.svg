  <path d="M47,47 L50,51 L53,47 Q50,45 47,47 Z" fill="#D4909A"/>
  <path d="M45,53 Q50,57 55,53" stroke="#B07878" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="27" y1="48" x2="42" y2="49" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="27" y1="51" x2="42" y2="52" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="49" x2="73" y2="48" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="52" x2="73" y2="51" stroke="#C8BFB5" stroke-width="0.8"/>
</svg>
