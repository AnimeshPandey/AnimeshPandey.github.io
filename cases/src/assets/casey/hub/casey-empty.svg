<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Casey shrugging — no results">
  <title>Casey shrugging</title>
  <!-- body: sage hoodie, arms raised in shrug -->
  <path d="M26,68 C22,72 22,92 32,96 L68,96 C78,92 78,72 74,68 C66,60 56,58 50,58 C44,58 34,60 26,68 Z" fill="#7DA888"/>
  <rect x="41" y="80" width="18" height="11" rx="2" fill="#6B9070" opacity="0.4"/>
  <!-- left arm raised in shrug -->
  <path d="M26,68 C18,62 12,55 14,47 C15,43 19,42 22,46 C24,50 22,56 26,60 Z" fill="#7DA888"/>
  <ellipse cx="14" cy="45" rx="5" ry="4" transform="rotate(-20,14,45)" fill="#F2EDE6"/>
  <!-- right arm raised in shrug -->
  <path d="M74,68 C82,62 88,55 86,47 C85,43 81,42 78,46 C76,50 78,56 74,60 Z" fill="#7DA888"/>
  <ellipse cx="86" cy="45" rx="5" ry="4" transform="rotate(20,86,45)" fill="#F2EDE6"/>
  <!-- paws resting on hips -->
  <ellipse cx="33" cy="91" rx="8" ry="4.5" fill="#F2EDE6"/>
  <ellipse cx="67" cy="91" rx="8" ry="4.5" fill="#F2EDE6"/>
  <!-- collar -->
  <rect x="35" y="62" width="30" height="5" rx="2.5" fill="#5E8F72"/>
  <rect x="47" y="65" width="6" height="7" rx="1.5" fill="#7CB89A"/>
  <text x="50" y="70.5" text-anchor="middle" font-family="monospace" font-size="3" fill="#3A6B4F">&lt;&gt;</text>
  <!-- head: slight tilt for shrug -->
  <ellipse cx="51" cy="38" rx="23" ry="25" transform="rotate(6,51,38)" fill="#F2EDE6"/>
  <ellipse cx="51" cy="43" rx="15" ry="11" fill="#E8E0D4" opacity="0.3"/>
  <!-- ears -->
  <path d="M28,22 L19,4 L41,16 Z" fill="#F2EDE6"/>
  <path d="M30,21 L23,9 L38,17 Z" fill="#EAB5B5" opacity="0.75"/>
  <path d="M74,22 L83,4 L61,16 Z" fill="#F2EDE6"/>
  <path d="M72,21 L79,9 L64,17 Z" fill="#EAB5B5" opacity="0.75"/>
  <!-- eyes: slightly squinted / uncertain -->
  <ellipse cx="39" cy="36" rx="7" ry="7.5" fill="#5BA3D4"/>
  <ellipse cx="39" cy="37" rx="4.5" ry="5.5" fill="#1A1410"/>
  <circle cx="41" cy="34" r="2" fill="#fff"/>
  <ellipse cx="63" cy="36" rx="7" ry="7.5" fill="#5BA3D4"/>
  <ellipse cx="63" cy="37" rx="4.5" ry="5.5" fill="#1A1410"/>
  <circle cx="65" cy="34" r="2" fill="#fff"/>
  <!-- nose + uncertain mouth -->
  <path d="M48,47 L51,51 L54,47 Q51,45 48,47 Z" fill="#D4909A"/>
  <path d="M46,54 Q51,57 56,54" stroke="#B07878" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="28" y1="48" x2="43" y2="49" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="28" y1="51" x2="43" y2="52" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="59" y1="49" x2="74" y2="48" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="59" y1="52" x2="74" y2="51" stroke="#C8BFB5" stroke-width="0.8"/>
  <!-- question mark above head -->
  <text x="76" y="20" font-family="sans-serif" font-size="14" fill="#5BA3D4" font-weight="bold" opacity="0.7">?</text>
</svg>
