<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Staff Casey — sleep">
  <title>Staff Casey, sleep</title>
  <!-- lying body -->
  <ellipse cx="52" cy="82" rx="40" ry="18" fill="#8C7A6E"/>
  <!-- tail curl -->
  <path d="M88,76 C96,67 95,56 84,54 C75,52 71,62 78,70" stroke="#F2EDE6" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- tucked paws -->
  <ellipse cx="22" cy="93" rx="14" ry="7" fill="#F2EDE6" opacity="0.85"/>
  <circle cx="15" cy="91" r="3" fill="#E8E0D4"/>
  <circle cx="22" cy="89" r="3" fill="#E8E0D4"/>
  <circle cx="29" cy="91" r="3" fill="#E8E0D4"/>
  <!-- glasses: folded on body nearby -->
  <line x1="60" y1="76" x2="74" y2="76" stroke="#C4986A" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="63" y="73" width="8" height="5" rx="2.5" fill="none" stroke="#C4986A" stroke-width="1.3"/>
  <!-- collar -->
  <rect x="34" y="62" width="32" height="5" rx="2.5" fill="#5E8F72"/>
  <rect x="47" y="65" width="6" height="7" rx="1.5" fill="#7CB89A"/>
  <text x="50" y="70.5" text-anchor="middle" font-family="monospace" font-size="3" fill="#3A6B4F">&lt;&gt;</text>
  <!-- head -->
  <ellipse cx="50" cy="38" rx="21" ry="23" fill="#F2EDE6"/>
  <ellipse cx="50" cy="43" rx="13" ry="10" fill="#E8E0D4" opacity="0.35"/>
  <!-- ears: drooped/relaxed -->
  <path d="M30,26 L22,8 L40,20 Z" fill="#F2EDE6"/>
  <path d="M32,25 L26,13 L38,21 Z" fill="#EAB5B5" opacity="0.7"/>
  <path d="M70,26 L78,8 L60,20 Z" fill="#F2EDE6"/>
  <path d="M68,25 L74,13 L62,21 Z" fill="#EAB5B5" opacity="0.7"/>
  <!-- eyes: peaceful sleeping crescents (no glasses) -->
  <path d="M31,38 Q38,33 45,38" stroke="#1A1410" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M55,38 Q62,33 69,38" stroke="#1A1410" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M47,47 L50,51 L53,47 Q50,45 47,47 Z" fill="#D4909A"/>
  <!-- whiskers -->
  <line x1="28" y1="48" x2="42" y2="49" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="28" y1="51" x2="42" y2="52" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="49" x2="72" y2="48" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="52" x2="72" y2="51" stroke="#C8BFB5" stroke-width="0.8"/>
  <!-- zzz: warm muted color -->
  <text x="72" y="28" font-family="serif" font-size="10" font-weight="600" fill="#8C7A6E" opacity="0.6">z</text>
  <text x="80" y="20" font-family="serif" font-size="8" font-weight="600" fill="#8C7A6E" opacity="0.5">z</text>
  <text x="87" y="14" font-family="serif" font-size="6" font-weight="600" fill="#8C7A6E" opacity="0.4">z</text>
</svg>
