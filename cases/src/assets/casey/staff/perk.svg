<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Staff Casey — perk">
  <title>Staff Casey, perk</title>
  <!-- body -->
  <path d="M28,67 C24,71 24,89 32,94 L68,94 C76,89 76,71 72,67 C65,60 56,58 50,58 C44,58 35,60 28,67 Z" fill="#8C7A6E"/>
  <!-- paws -->
  <ellipse cx="33" cy="91" rx="9" ry="5" fill="#F2EDE6"/>
  <circle cx="28" cy="90" r="2.5" fill="#E8E0D4"/>
  <circle cx="33" cy="88" r="2.5" fill="#E8E0D4"/>
  <circle cx="38" cy="90" r="2.5" fill="#E8E0D4"/>
  <ellipse cx="67" cy="91" rx="9" ry="5" fill="#F2EDE6"/>
  <circle cx="62" cy="90" r="2.5" fill="#E8E0D4"/>
  <circle cx="67" cy="88" r="2.5" fill="#E8E0D4"/>
  <circle cx="72" cy="90" r="2.5" fill="#E8E0D4"/>
  <!-- collar -->
  <rect x="34" y="62" width="32" height="5" rx="2.5" fill="#5E8F72"/>
  <rect x="47" y="65" width="6" height="7" rx="1.5" fill="#7CB89A"/>
  <text x="50" y="70.5" text-anchor="middle" font-family="monospace" font-size="3" fill="#3A6B4F">&lt;&gt;</text>
  <!-- head -->
  <ellipse cx="50" cy="38" rx="21" ry="23" fill="#F2EDE6"/>
  <ellipse cx="50" cy="43" rx="13" ry="10" fill="#E8E0D4" opacity="0.35"/>
  <!-- ears: perked (staff stays composed even when alert) -->
  <path d="M30,22 L23,4 L40,17 Z" fill="#F2EDE6"/>
  <path d="M32,21 L26,9 L39,17 Z" fill="#EAB5B5" opacity="0.7"/>
  <path d="M70,22 L77,4 L60,17 Z" fill="#F2EDE6"/>
  <path d="M68,21 L74,9 L61,17 Z" fill="#EAB5B5" opacity="0.7"/>
  <!-- glasses (pushed up slightly with alert) -->
  <rect x="30" y="30" width="14" height="9" rx="4.5" fill="none" stroke="#C4986A" stroke-width="1.5"/>
  <rect x="56" y="30" width="14" height="9" rx="4.5" fill="none" stroke="#C4986A" stroke-width="1.5"/>
  <line x1="44" y1="34" x2="56" y2="34" stroke="#C4986A" stroke-width="1.2"/>
  <line x1="18" y1="34" x2="30" y2="34" stroke="#C4986A" stroke-width="1.2"/>
  <line x1="70" y1="34" x2="78" y2="34" stroke="#C4986A" stroke-width="1.2"/>
  <!-- eyes: alert but measured -->
  <ellipse cx="38" cy="35" rx="6" ry="7" fill="#5BA3D4"/>
  <ellipse cx="38" cy="36" rx="4" ry="5" fill="#1A1410"/>
  <circle cx="40" cy="32" r="2" fill="#fff"/>
  <ellipse cx="62" cy="35" rx="6" ry="7" fill="#5BA3D4"/>
  <ellipse cx="62" cy="36" rx="4" ry="5" fill="#1A1410"/>
  <circle cx="64" cy="32" r="2" fill="#fff"/>
  <!-- nose + mouth -->
  <path d="M47,47 L50,51 L53,47 Q50,45 47,47 Z" fill="#D4909A"/>
  <path d="M45,53 Q50,57 55,53" stroke="#B07878" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="28" y1="48" x2="42" y2="49" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="28" y1="51" x2="42" y2="52" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="49" x2="72" y2="48" stroke="#C8BFB5" stroke-width="0.8"/>
  <line x1="58" y1="52" x2="72" y2="51" stroke="#C8BFB5" stroke-width="0.8"/>
</svg>
