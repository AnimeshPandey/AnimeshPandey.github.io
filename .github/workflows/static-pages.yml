name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into static files
        env:
          W3F_ACCESS_KEY: ${{ secrets.W3F_ACCESS_KEY }}
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
          CLOUDFLARE_BEACON_TOKEN: ${{ secrets.CLOUDFLARE_BEACON_TOKEN }}
        run: |
          set -euo pipefail
          W3F_KEY="${W3F_ACCESS_KEY:-}"
          if [ -z "$W3F_KEY" ]; then W3F_KEY="${WEB3FORMS_ACCESS_KEY:-}"; fi
          CF_TOKEN="${CF_BEACON_TOKEN:-}"
          if [ -z "$CF_TOKEN" ]; then CF_TOKEN="${CLOUDFLARE_BEACON_TOKEN:-}"; fi

          inject_w3f() {
            # Replace only deploy placeholders — not UNCONFIGURED sentinel in contact.js
            sed -i "s|YOUR_WEB3FORMS_ACCESS_KEY|${W3F_KEY}|g" assets/contact.js index.html
            if grep -q "__WEB3FORMS_KEY_NOT_SET__" assets/contact.js && grep -q "${W3F_KEY}" assets/contact.js; then
              echo "✓ contact.js has injected key and intact UNCONFIGURED sentinel"
            fi
          }

          # Web3Forms access key → assets/contact.js + index.html meta (HTML is network-first in SW)
          if [ -n "$W3F_KEY" ]; then
            inject_w3f
            echo "✓ Web3Forms key injected into contact.js and index.html"
            if grep -q "YOUR_WEB3FORMS_ACCESS_KEY" assets/contact.js index.html; then
              echo "::error::Web3Forms placeholder still present after inject"
              exit 1
            fi
          else
            echo "::warning::No Web3Forms secret — set W3F_ACCESS_KEY (or WEB3FORMS_ACCESS_KEY) in repo Settings → Secrets"
          fi

          # Cloudflare beacon token → all HTML files
          if [ -n "$CF_TOKEN" ]; then
            find . -name "*.html" -not -path "./.git/*" \
              -exec sed -i "s|YOUR_CF_BEACON_TOKEN|${CF_TOKEN}|g" {} +
            echo "✓ Cloudflare beacon token injected"
            if find . -name "*.html" -not -path "./.git/*" -exec grep -l "YOUR_CF_BEACON_TOKEN" {} + | grep -q .; then
              echo "::error::Cloudflare placeholder still present in HTML"
              exit 1
            fi
          else
            echo "::warning::No CF beacon secret — set CF_BEACON_TOKEN (or CLOUDFLARE_BEACON_TOKEN)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
