name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Casebook (Eleventy) ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install casebook dependencies
        working-directory: cases
        run: npm install

      - name: Build casebook
        working-directory: cases
        run: npm run build

      - name: Verify live case pages built
        working-directory: cases
        run: node scripts/assert-live-cases.mjs

      - name: Install portfolio site dependencies
        working-directory: site
        run: npm install

      - name: Build portfolio site (Eleventy)
        working-directory: site
        run: npm run build

      # ── Stage merged artifact ──────────────────────────────────────────────
      # Root site from site/_site/; casebook at /cases/
      - name: Stage deployment artifact
        run: |
          set -euo pipefail
          mkdir -p _deploy

          rsync -a site/_site/ _deploy/

          mkdir -p _deploy/cases
          rsync -a cases/_site/ _deploy/cases/

          if [ -f _headers ]; then cp _headers _deploy/_headers; fi
          if [ -f sw.js ]; then cp sw.js _deploy/sw.js; fi

          echo "✓ Staged $(find _deploy -type f | wc -l) files"

      # ── Stamp must run before tests so HTML/JS have real BUILD_IDs ──────────
      - name: Stamp deploy build id for cache busting
        run: |
          set -euo pipefail
          BUILD_ID="${GITHUB_SHA:0:7}"
          BUILD_TIME="$(date -u +"%Y-%m-%d %H:%M UTC")"
          echo "Asset build id: ${BUILD_ID} / build time: ${BUILD_TIME}"
          find _deploy -type f \( -name '*.html' -o -name '*.js' \) -print0 \
            | xargs -0 sed -i "s|__AP_BUILD_ID__|${BUILD_ID}|g; s|__AP_BUILD_TIME__|${BUILD_TIME}|g"
          if grep -rq '__AP_BUILD_ID__\|__AP_BUILD_TIME__' _deploy 2>/dev/null; then
            echo "::warning::Some __AP_BUILD_ID__/__AP_BUILD_TIME__ placeholders remain (non-html/js assets are OK)"
          fi

      - name: Minify CSS and JS in staged artifact
        run: |
          set -euo pipefail
          cd _deploy

          CSS_FILES=(
            assets/site.css
            assets/theme.css
            assets/styles/foundation.css
            assets/platform/chrome.css
            assets/platform/prefs-chrome.css
            assets/platform/shell.css
            assets/styles/components/button.css
          )
          for f in "${CSS_FILES[@]}"; do
            [ -f "$f" ] && npx --yes clean-css-cli -o "$f" "$f" && echo "minified $f"
          done

          JS_FILES=(
            assets/visuals.js
            assets/nav.js
            assets/sw-migrate.js
          )
          for f in "${JS_FILES[@]}"; do
            [ -f "$f" ] && npx --yes terser "$f" -o "$f" --compress --mangle && echo "minified $f"
          done

          echo "✓ CSS/JS minification complete"

      - name: Static and unit tests on staged artifact
        env:
          DEPLOY_DIR: ${{ github.workspace }}/_deploy
        run: |
          cd tests
          npm install
          npm run test:static
          npm run test:unit

      - name: Post-stamp deploy artifact checks
        env:
          DEPLOY_DIR: ${{ github.workspace }}/_deploy
        run: |
          cd tests
          node static/assert-casey-fur-deploy.mjs
          node static/assert-casey-no-checker-deploy.mjs
          node static/assert-casey-floor-matte-deploy.mjs
          node static/assert-casey-html-bust.mjs

      # ── Inject secrets ─────────────────────────────────────────────────────

      - name: Inject secrets into deployed files
        env:
          W3F_ACCESS_KEY: ${{ secrets.W3F_ACCESS_KEY }}
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
          CLOUDFLARE_BEACON_TOKEN: ${{ secrets.CLOUDFLARE_BEACON_TOKEN }}
        run: |
          set -euo pipefail
          W3F_KEY="${W3F_ACCESS_KEY:-}"
          if [ -z "$W3F_KEY" ]; then W3F_KEY="${WEB3FORMS_ACCESS_KEY:-}"; fi
          CF_TOKEN="${CF_BEACON_TOKEN:-}"
          if [ -z "$CF_TOKEN" ]; then CF_TOKEN="${CLOUDFLARE_BEACON_TOKEN:-}"; fi

          # Web3Forms key → portfolio contact.js + index.html only
          if [ -n "$W3F_KEY" ]; then
            sed -i "s|YOUR_WEB3FORMS_ACCESS_KEY|${W3F_KEY}|g" \
              _deploy/assets/contact.js _deploy/index.html
            if grep -q "YOUR_WEB3FORMS_ACCESS_KEY" _deploy/assets/contact.js _deploy/index.html 2>/dev/null; then
              echo "::error::Web3Forms placeholder still present after inject"
              exit 1
            fi
            echo "✓ Web3Forms key injected"
          else
            echo "::warning::No Web3Forms secret — set W3F_ACCESS_KEY in repo Settings → Secrets"
          fi

          # Cloudflare beacon token → all HTML (portfolio + casebook)
          if [ -n "$CF_TOKEN" ]; then
            find _deploy -name "*.html" \
              -exec sed -i "s|YOUR_CF_BEACON_TOKEN|${CF_TOKEN}|g" {} +
            if find _deploy -name "*.html" -exec grep -l "YOUR_CF_BEACON_TOKEN" {} + 2>/dev/null | grep -q .; then
              echo "::error::Cloudflare placeholder still present in HTML"
              exit 1
            fi
            echo "✓ Cloudflare beacon token injected into all HTML"
          else
            echo "::warning::No CF beacon secret — set CF_BEACON_TOKEN in repo Settings → Secrets"
          fi

      # ── GitHub Pages ───────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_deploy"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
