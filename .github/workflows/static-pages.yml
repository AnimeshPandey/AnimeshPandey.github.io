name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into static files
        env:
          W3F_KEY: ${{ secrets.W3F_ACCESS_KEY }}
          CF_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: |
          # Web3Forms access key → assets/contact.js
          if [ -n "$W3F_KEY" ]; then
            sed -i "s|YOUR_WEB3FORMS_ACCESS_KEY|${W3F_KEY}|g" assets/contact.js
            echo "✓ Web3Forms key injected"
            grep -c "YOUR_WEB3FORMS_ACCESS_KEY" assets/contact.js && echo "⚠ placeholder still present!" || echo "✓ placeholder replaced"
          else
            echo "⚠ W3F_ACCESS_KEY secret not set — contact form will fall back to mailto"
          fi

          # Cloudflare beacon token → all HTML files
          if [ -n "$CF_TOKEN" ]; then
            find . -name "*.html" -not -path "./.git/*" \
              -exec sed -i "s|YOUR_CF_BEACON_TOKEN|${CF_TOKEN}|g" {} +
            echo "✓ Cloudflare beacon token injected"
          else
            echo "⚠ CF_BEACON_TOKEN secret not set — analytics beacon will not fire"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
