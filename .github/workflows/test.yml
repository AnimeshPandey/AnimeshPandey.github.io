name: Test portfolio and Casebook

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the case build's `git log`-based last-updated
          # stamp (design-backlog idea #27) reflects real per-file commit
          # dates in this test build too, not the depth-1 default.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        working-directory: tests
        run: npm install

      - name: Build merged deploy artifact
        working-directory: tests
        run: npm run build:deploy

      - name: Static contract tests
        working-directory: tests
        run: npm run test:static

      - name: Unit tests
        working-directory: tests
        run: npm run test:unit

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        working-directory: tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
